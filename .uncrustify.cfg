code_width = 120
input_tab_size = 4
indent_with_tabs = 0
indent_columns = 4
indent_switch_case = indent_columns
indent_align_string = true
indent_case_brace = 0
indent_namespace = false
indent_class = true
indent_access_spec_body = false
indent_access_spec = -4

ls_for_split_full = true
ls_func_split_full = true
ls_code_width = true

nl_enum_brace = force
nl_union_brace = force
nl_struct_brace = force
nl_do_brace = force
nl_if_brace = force
nl_for_brace = force
nl_else_brace = force
nl_while_brace = force
nl_switch_brace = force
nl_fcall_brace = force
nl_fdef_brace = force
nl_func_decl_args = force
nl_func_def_args = force
nl_brace_else = force
nl_brace_while = force
nl_after_return = true
nl_before_case = false
nl_after_case = false

sp_brace_else = force
sp_else_brace = force
sp_sparen_brace = force
sp_do_brace_open = force
sp_brace_close_while = force
sp_assign = force
sp_pp_concat = ignore
sp_bool = force
sp_compare = force
sp_not = remove
sp_inv = remove
sp_addr = remove
sp_member = remove
sp_deref = remove
sp_sign = remove
sp_incdec = remove
sp_before_ptr_star = force
sp_between_ptr_star = remove
sp_after_ptr_star = remove
sp_after_ptr_star_qualifier = ignore
sp_after_ptr_star_func = remove
sp_after_type = force
sp_before_sparen = force
sp_inside_paren = remove
sp_inside_sparen = remove
sp_inside_paren_cast = remove
sp_inside_fparen = remove
sp_inside_fparens = remove
sp_inside_tparen = remove
sp_inside_for = remove
sp_paren_paren = remove
sp_sparen_paren = remove
sp_cparen_oparen = remove
sp_before_semi = remove
sp_before_semi_for = remove
sp_before_semi_for_empty = remove
sp_between_semi_for_empty = remove
sp_after_semi = force
sp_after_semi_for = force
sp_after_semi_for_empty = remove
sp_inside_square = remove
sp_after_comma = force
sp_before_comma = remove
sp_before_case_colon = remove
sp_after_cast = force
sp_sizeof_paren = remove
sp_inside_braces = force
sp_inside_braces_enum = force
sp_inside_braces_struct = force
sp_type_func = force
sp_func_proto_paren = remove
sp_func_def_paren = remove
sp_func_call_paren = remove
sp_attribute_paren = remove
sp_defined_paren = remove
sp_macro = force
sp_macro_func = force
sp_brace_typedef = force
sp_before_nl_cont = force
sp_cond_colon = force
sp_cond_question = force
sp_endif_cmt = force
sp_arith = force
sp_arith_additive = force
sp_after_operator = remove

nl_start_of_file = remove
nl_end_of_file = force
nl_end_of_file_min = 1
nl_max = 2
nl_max_blank_in_func = 1
nl_before_block_comment = 2
nl_after_func_proto = 1
nl_after_func_body = 2

mod_full_brace_do = force
mod_full_brace_for = force
mod_full_brace_if = force
mod_full_brace_while = force
mod_full_brace_nl = 1
mod_paren_on_return = remove
mod_remove_extra_semicolon = true

align_var_def_span = 1
align_var_def_star_style = 2
align_var_def_amp_style = 2
align_assign_span = 1
align_enum_equ_span = 1
align_typedef_span = 1
align_func_params = true
align_same_func_call_params = true
align_keep_tabs = false
align_with_tabs = false
align_on_tabstop = false

eat_blanks_after_open_brace = true
eat_blanks_before_close_brace = true

cmt_multi_check_last = false
cmt_indent_multi = true
cmt_align_doxygen_javadoc_tags = true